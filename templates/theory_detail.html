{% extends "base.html" %}
{% block title %}{{ title }} - Теория{% endblock %}
{% block content %}
<div class="content-sidebar" style="width: 100%; max-width: 1200px; margin: 0 auto;">
    <!-- Кнопка назад -->
    <div style="margin-bottom: 20px;">
        <a href="/theory" style="text-decoration: none; color: #667eea; display: inline-flex; align-items: center; gap: 5px;">
            ← Назад к списку разделов
        </a>
    </div>

    <!-- Основной контент - только теория -->
    <div style="background: #fff; border-radius: 20px; padding: 40px; box-shadow: 0 5px 20px rgba(0,0,0,0.08);">
        {{ content | safe }}
    </div>
</div>

<style>
.math-block {
    background: #f8f9fa;
    padding: 15px;
    border-radius: 8px;
    font-family: 'Courier New', monospace;
    margin: 15px 0;
    border-left: 4px solid #667eea;
    overflow-x: auto;
}
h2 {
    color: #667eea;
    margin-top: 0;
    margin-bottom: 20px;
}
h3 {
    color: #764ba2;
    margin-top: 25px;
    margin-bottom: 10px;
}
p {
    line-height: 1.6;
    color: #333;
}
ul, ol {
    line-height: 1.6;
}
</style>
{% endblock %}
